<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IPAR · Beñat">
<meta name="theme-color" content="#0a0a0a">
<title>IPAR · Beñat</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;500;700;900&display=swap');
  :root {
    --bg: #0a0a0a; --surface: #141414; --border: #2a2a2a;
    --accent: #ff6b2b; --accent2: #ffb347; --text: #f0f0f0;
    --muted: #666; --green: #2ecc71; --red: #e74c3c;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); font-family:'Barlow Condensed',sans-serif; min-height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
  .header { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 20px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .header-brand { display:flex; align-items:baseline; gap:8px; }
  .header-logo { font-family:'Space Mono',monospace; font-size:13px; font-weight:700; color:var(--accent); letter-spacing:2px; }
  .header-sep { color:var(--border); font-size:18px; }
  .header-user { font-size:22px; font-weight:900; letter-spacing:1px; }
  .header-status { display:flex; align-items:center; gap:6px; font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); }
  .status-dot { width:7px; height:7px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .main { flex:1; display:flex; flex-direction:column; overflow-y:auto; }
  .screen { display:none; flex-direction:column; flex:1; }
  .screen.active { display:flex; }

  /* SCAN */
  #screen-scan { align-items:center; justify-content:center; gap:20px; padding:24px 20px; }
  .scan-title { font-family:'Space Mono',monospace; font-size:11px; letter-spacing:4px; color:var(--muted); text-transform:uppercase; }
  #qr-reader { width:280px !important; border-radius:8px; overflow:hidden; background:#000; }
  #qr-reader__scan_region { border-radius:6px; overflow:hidden; }
  #qr-reader__dashboard { display:none !important; }
  .scan-hint { font-size:15px; color:var(--muted); text-align:center; }
  .btn-scan { background:var(--accent); color:#fff; border:none; border-radius:4px; padding:16px 40px; font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; letter-spacing:3px; text-transform:uppercase; cursor:pointer; width:100%; max-width:300px; transition:all 0.15s; }
  .btn-scan:active { transform:scale(0.97); }
  .btn-scan.scanning { background:#333; color:var(--muted); }

  /* CONFIRM */
  #screen-confirm { padding:28px 20px; gap:16px; align-items:stretch; }
  .confirm-label { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:4px; }
  .confirm-value { font-size:28px; font-weight:700; letter-spacing:1px; }
  .confirm-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:18px 20px; }
  .tipo-badge { display:inline-block; padding:6px 16px; border-radius:3px; font-size:18px; font-weight:900; letter-spacing:3px; text-transform:uppercase; }
  .tipo-montaje { background:#1a3a2a; color:#2ecc71; border:1px solid #2ecc7150; }
  .tipo-desmontaje { background:#3a1a1a; color:#e74c3c; border:1px solid #e74c3c50; }
  .tipo-sat { background:#1a2a3a; color:#3498db; border:1px solid #3498db50; }
  .confirm-actions { display:flex; gap:12px; margin-top:auto; }
  .btn-primary { flex:1; background:var(--green); color:#fff; border:none; border-radius:4px; padding:18px; font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:700; letter-spacing:3px; text-transform:uppercase; cursor:pointer; }
  .btn-secondary { background:transparent; color:var(--muted); border:1px solid var(--border); border-radius:4px; padding:18px 20px; font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer; }

  /* TIMER */
  #screen-timer { align-items:center; justify-content:space-between; padding:24px 20px; }
  .timer-project-info { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; }
  .timer-project-name { font-size:15px; font-weight:700; letter-spacing:2px; }
  .timer-project-client { font-size:13px; color:var(--muted); margin-top:2px; }
  .timer-display { text-align:center; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; }
  .timer-tipo { font-family:'Space Mono',monospace; font-size:11px; letter-spacing:4px; color:var(--muted); text-transform:uppercase; }
  .timer-digits { font-family:'Space Mono',monospace; font-size:72px; font-weight:700; color:var(--accent); letter-spacing:-2px; line-height:1; }
  .timer-seconds { font-size:36px; color:var(--accent2); }
  .timer-running-dot { width:10px; height:10px; border-radius:50%; background:var(--red); animation:pulse 1s infinite; margin:0 auto; }
  .timer-sessions { width:100%; }
  .sessions-title { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:3px; color:var(--muted); margin-bottom:10px; }
  .sessions-list { display:flex; flex-direction:column; gap:6px; max-height:120px; overflow-y:auto; }
  .session-item { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:8px 12px; display:flex; justify-content:space-between; font-family:'Space Mono',monospace; font-size:11px; }
  .session-time { color:var(--muted); }
  .session-dur { color:var(--green); font-weight:700; }
  .btn-stop { width:100%; background:var(--red); color:#fff; border:none; border-radius:4px; padding:22px; font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:900; letter-spacing:5px; text-transform:uppercase; cursor:pointer; box-shadow:0 0 30px #e74c3c40; }
  .btn-stop:active { transform:scale(0.97); background:#c0392b; }

  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px); background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 24px; font-family:'Space Mono',monospace; font-size:12px; transition:transform 0.3s ease; z-index:100; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .toast.success { border-color:var(--green); color:var(--green); }
  .toast.error { border-color:var(--red); color:var(--red); }
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <span class="header-logo">IPAR</span>
    <span class="header-sep">·</span>
    <span class="header-user">BEÑAT</span>
  </div>
  <div class="header-status">
    <div class="status-dot"></div>
    <span>ONLINE</span>
  </div>
</div>

<div class="main">

  <div class="screen active" id="screen-scan">
    <span class="scan-title">Escanear proyecto</span>
    <div id="qr-reader"></div>
    <p class="scan-hint">Apunta al código QR del proyecto</p>

    <button class="btn-scan" id="btn-toggle-scan">ABRIR CÁMARA</button>
  </div>

  <div class="screen" id="screen-confirm">
    <div class="confirm-card">
      <div class="confirm-label">Proyecto</div>
      <div class="confirm-value" id="conf-proyecto">—</div>
    </div>
    <div class="confirm-card">
      <div class="confirm-label">Cliente</div>
      <div class="confirm-value" id="conf-cliente">—</div>
    </div>
    <div class="confirm-card">
      <div class="confirm-label">Tipo de trabajo</div>
      <div id="conf-tipo-badge" class="tipo-badge">—</div>
    </div>
    <div class="confirm-card">
      <div class="confirm-label">Cabezal</div>
      <div class="confirm-value" id="conf-cabezal" style="font-size:18px">—</div>
    </div>
    <div class="confirm-actions">
      <button class="btn-secondary" id="btn-cancel-confirm">CANCELAR</button>
      <button class="btn-primary" id="btn-iniciar">INICIAR</button>
    </div>
  </div>

  <div class="screen" id="screen-timer">
    <div class="timer-project-info">
      <div>
        <div class="timer-project-name" id="timer-proyecto">—</div>
        <div class="timer-project-client" id="timer-cliente">—</div>
      </div>
      <div id="timer-tipo-badge2" class="tipo-badge" style="font-size:13px">—</div>
    </div>
    <div class="timer-display">
      <div class="timer-tipo" id="timer-tipo-label">—</div>
      <div class="timer-digits">
        <span id="timer-hh">00</span>:<span id="timer-mm">00</span><span class="timer-seconds">:<span id="timer-ss">00</span></span>
      </div>
      <div class="timer-running-dot"></div>
    </div>
    <div class="timer-sessions">
      <div class="sessions-title">SESIONES HOY</div>
      <div class="sessions-list" id="sessions-list"></div>
    </div>
    <button class="btn-stop" id="btn-stop">⏹ PARAR</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const OPERARIO = 'benat';
const SUPABASE_URL = 'https://kdgugxmidlojortcjfxk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkZ3VneG1pZGxvam9ydGNqZnhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MTAyODcsImV4cCI6MjA5MzQ4NjI4N30.a6SB-zveaQzjKcUTLw1jRv4lirlcZlGwTLtPJ-Ia9aM';

let currentData = null, sessionId = null, startTime = null, timerInterval = null;
let html5QrCode = null, cameraActive = false;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
function pad(n) { return String(n).padStart(2,'0'); }
function getTipoBadgeClass(tipo) {
  const t = (tipo||'').toLowerCase();
  if (t==='montaje') return 'tipo-montaje';
  if (t==='desmontaje') return 'tipo-desmontaje';
  return 'tipo-sat';
}

async function supabaseRequest(method, path, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method,
    headers: {
      'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method==='POST' ? 'return=representation' : 'return=minimal'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  if (method==='POST') return res.json();
  return res;
}

async function checkActiveSession() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/sesiones?operario=eq.${OPERARIO}&fin=is.null&select=*`,
    { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
  );
  const data = await res.json();
  return data.length > 0 ? data[0] : null;
}

async function loadTodaySessions(proyecto) {
  const today = new Date().toISOString().split('T')[0];
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/sesiones?operario=eq.${OPERARIO}&proyecto=eq.${proyecto}&inicio=gte.${today}T00:00:00&fin=not.is.null&select=*&order=inicio.desc`,
    { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
  );
  return res.json();
}

async function startScanner() {
  if (cameraActive) { await stopScanner(); return; }
  const btn = document.getElementById('btn-toggle-scan');
  btn.textContent = 'DETENER'; btn.classList.add('scanning');
  html5QrCode = new Html5Qrcode("qr-reader");
  try {
    await html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 220, height: 220 } },
      (decodedText) => { stopScanner(); handleQR(decodedText); },
      () => {}
    );
    cameraActive = true;
  } catch(err) {
    showToast('Error al acceder a la cámara', 'error');
    btn.textContent = 'ABRIR CÁMARA'; btn.classList.remove('scanning');
  }
}

async function stopScanner() {
  if (html5QrCode && cameraActive) {
    try { await html5QrCode.stop(); } catch(e) {}
    cameraActive = false;
  }
  const btn = document.getElementById('btn-toggle-scan');
  btn.textContent = 'ABRIR CÁMARA'; btn.classList.remove('scanning');
}

function handleQR(raw) {
  try {
    const data = JSON.parse(raw);
    if (!data.proyecto || !data.tipo) throw new Error('QR inválido');
    currentData = data;
    document.getElementById('conf-proyecto').textContent = data.proyecto || '—';
    document.getElementById('conf-cliente').textContent = data.cliente || '—';
    document.getElementById('conf-cabezal').textContent = data.cabezal || '—';
    const badge = document.getElementById('conf-tipo-badge');
    badge.textContent = (data.tipo||'').toUpperCase();
    badge.className = 'tipo-badge ' + getTipoBadgeClass(data.tipo);
    showScreen('screen-confirm');
  } catch { showToast('QR no reconocido', 'error'); }
}

function startTimer(from) {
  startTime = typeof from === 'string' ? new Date(from) : from;
  timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - startTime.getTime()) / 1000);
    document.getElementById('timer-hh').textContent = pad(Math.floor(s/3600));
    document.getElementById('timer-mm').textContent = pad(Math.floor((s%3600)/60));
    document.getElementById('timer-ss').textContent = pad(s%60);
  }, 1000);
}
function stopTimer() { clearInterval(timerInterval); timerInterval = null; }

async function renderTimerScreen(data, sesionActiva) {
  document.getElementById('timer-proyecto').textContent = `#${data.proyecto} · ${data.cliente}`;
  document.getElementById('timer-cliente').textContent = data.cabezal || '';
  document.getElementById('timer-tipo-label').textContent = (data.tipo||'').toUpperCase();
  const badge2 = document.getElementById('timer-tipo-badge2');
  badge2.textContent = (data.tipo||'').toUpperCase();
  badge2.className = 'tipo-badge ' + getTipoBadgeClass(data.tipo);
  showScreen('screen-timer');
  startTimer(sesionActiva.inicio);
  const sessions = await loadTodaySessions(data.proyecto);
  const list = document.getElementById('sessions-list');
  list.innerHTML = '';
  sessions.forEach(s => {
    const div = document.createElement('div');
    div.className = 'session-item';
    const hora = new Date(s.inicio).toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
    div.innerHTML = `<span class="session-time">${hora}</span><span class="session-dur">${s.duracion_min} min</span>`;
    list.appendChild(div);
  });
}

document.getElementById('btn-toggle-scan').addEventListener('click', startScanner);


document.getElementById('btn-cancel-confirm').addEventListener('click', () => {
  currentData = null; showScreen('screen-scan');
});

document.getElementById('btn-iniciar').addEventListener('click', async () => {
  if (!currentData) return;
  try {
    const result = await supabaseRequest('POST', 'sesiones', {
      operario: OPERARIO, proyecto: currentData.proyecto, cliente: currentData.cliente,
      tipo_trabajo: currentData.tipo, cabezal: currentData.cabezal || null,
      inicio: new Date().toISOString()
    });
    sessionId = result[0].id;
    await renderTimerScreen(currentData, result[0]);
    showToast('Sesión iniciada', 'success');
  } catch(e) { showToast('Error al iniciar sesión', 'error'); console.error(e); }
});

document.getElementById('btn-stop').addEventListener('click', async () => {
  if (!sessionId) return;
  stopTimer();
  const fin = new Date();
  const durMin = Math.round((fin - startTime) / 60000);
  try {
    await supabaseRequest('PATCH', `sesiones?id=eq.${sessionId}`, {
      fin: fin.toISOString(), duracion_min: durMin
    });
    showToast(`Guardado · ${durMin} min`, 'success');
    sessionId = null; startTime = null; currentData = null;
    showScreen('screen-scan');
  } catch(e) { showToast('Error al guardar', 'error'); startTimer(startTime); }
});

(async () => {
  try {
    const active = await checkActiveSession();
    if (active) {
      currentData = { proyecto: active.proyecto, cliente: active.cliente, tipo: active.tipo_trabajo, cabezal: active.cabezal };
      sessionId = active.id;
      await renderTimerScreen(currentData, active);
      showToast('Sesión activa recuperada', 'success');
    }
  } catch(e) { console.error(e); }
})();
</script>
</body>
</html>
